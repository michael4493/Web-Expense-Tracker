<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>肥蟲記帳本</title>
    <style>
        /* 這裡放 CSS，我們先寫一點點讓畫面不要太醜 */
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        input, button { margin: 5px 0; padding: 8px; width: 100%; box-sizing: border-box; }
        li { margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>💰 肥蟲記帳本🐛 💰</h1>

    <div>
        <input type="date" id="dateInput">
        <input type="text" id="categoryInput" placeholder="請輸入類別 (例如：午餐、交通)">
        <input type="number" id="amountInput" placeholder="請輸入金額">
        <button onclick="addExpense()">新增支出</button>
    </div>

    <hr>

    <h2>總支出: $<span id="totalAmount">0</span></h2>
    <ul id="expenseList">
        </ul>

    <script>
        // 準備一個變數來記錄總金額
        let total = 0;

        // 當按下「新增支出」按鈕時，會執行這個 function
        function addExpense() {
            // 1. 抓取使用者輸入的值 (就像 Python 裡的變數)
            let date = document.getElementById("dateInput").value;
            let category = document.getElementById("categoryInput").value;
            let amount = document.getElementById("amountInput").value;

            // 簡單的檢查：如果沒有填寫完整，就跳出警告
            if (date === "" || category === "" || amount === "") {
                alert("請填寫完整的日期、類別與金額！");
                return; // 提早結束，不往下執行
            }

            // 將金額轉換為數字 (這就像 Python 裡的 int() !)
            let amountNumber = parseInt(amount);

            // 2. 更新總金額
            total += amountNumber;
            document.getElementById("totalAmount").innerText = total;

            // 3. 把紀錄顯示到畫面的清單上
            let list = document.getElementById("expenseList");
            let newItem = document.createElement("li");
            newItem.innerText = `日期: ${date} | 類別: ${category} | 金額: $${amountNumber}`;
            
            list.appendChild(newItem); // 把新項目加進清單裡

            // 4. 清空輸入框，方便輸入下一筆
            document.getElementById("categoryInput").value = "";
            document.getElementById("amountInput").value = "";
        }
    </script>

</body>
</html>
