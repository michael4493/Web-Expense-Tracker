<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰肥蟲記帳簿💰</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <div id="userInfo" style="font-weight: 700; color: #2c3e50;">
            <button onclick="loginWithGoogle()" class="theme-btn" style="background: #4285F4; color: white; border: none; box-shadow: 0 4px 12px rgba(66, 133, 244, 0.3) !important;">
                🔒 Google 登入 (Login)
            </button>
        </div>

        <div style="display: flex; gap: 10px;">
            <button onclick="toggleTheme()" class="theme-btn" id="themeBtn">🌙 暗色模式</button>
            <button onclick="toggleLanguage()" class="lang-btn">🌐 EN / 中文</button>
        </div>
    </div>

    <h1 data-i18n="appTitle">💰 肥蟲記賬簿🐛 💰</h1>

    <div class="card" style="display: flex; flex-wrap: wrap; justify-content: flex-end; align-items: center; padding: 15px; margin-bottom: 25px;">
        <label for="filterTime" style="font-weight: 700; margin-right: 15px; margin-bottom: 0;" data-i18n="viewRange">📅 查看範圍：</label>
        
        <select id="filterTime" onchange="handleFilterChange()" style="width: auto; min-width: 180px; margin-bottom: 0;">
            <option value="all" data-i18n="rangeAll">全部紀錄 (All Time)</option>
            <option value="today" data-i18n="rangeDay">本日 (Today)</option>
            <option value="week" data-i18n="rangeWeek">最近 7 天 (Last 7 Days)</option>
            <option value="month" data-i18n="rangeMonth">這個月 (This Month)</option>
            <option value="custom" data-i18n="rangeCustom">自訂範圍 (Custom)</option>
        </select>
        
        <div id="customDateArea" style="display: none; margin-top: 15px; width: 100%; text-align: right;">
            <input type="date" id="customStartDate" onchange="updateDashboard()" style="width: auto; display: inline-block;"> 
            <span data-i18n="to" style="margin: 0 10px; font-weight: bold;">至</span> 
            <input type="date" id="customEndDate" onchange="updateDashboard()" style="width: auto; display: inline-block;">
        </div>
    </div>

    <div class="summary-container">
        <div class="summary-box bg-income">
            <span data-i18n="totalIncome">總收入</span><br>$<span id="totalIncome">0</span>
        </div>
        <div class="summary-box bg-expense">
            <span data-i18n="totalExpense">總支出</span><br>$<span id="totalExpense">0</span>
        </div>
        <div class="summary-box bg-save">
            <span data-i18n="currentBalance">目前結餘</span><br>$<span id="totalBalance">0</span>
            <div id="accountBalances" style="font-size: 13px; margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.4); padding-top: 8px; text-align: left; font-weight: normal;">
            </div>
        </div>
    </div>

    <div class="card">
        <h3 data-i18n="addTransaction">➕ 新增交易</h3>
        
        <div class="form-group">
            <label data-i18n="date">日期</label>
            <input type="date" id="inputDate">
        </div>
        
        <div class="form-group">
            <label data-i18n="transactionType">交易類型</label>
            <div class="type-btn-group">
                <button type="button" id="btnExpense" class="type-btn active" onclick="setTransactionType('expense')" data-i18n="expenseBtn">支出💸</button>
                <button type="button" id="btnIncome" class="type-btn" onclick="setTransactionType('income')" data-i18n="incomeBtn">收入💰</button>
                <button type="button" id="btnTransfer" class="type-btn" onclick="setTransactionType('transfer')" data-i18n="transferBtn">轉帳🔄</button>
            </div>
            <input type="hidden" id="inputType" value="expense">
        </div>

        <div class="form-group" id="groupCategory">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px;">
                <label data-i18n="category" style="margin-bottom: 0;">用途 / 分類</label>
                <span style="cursor: pointer; color: #007bff; font-size: 13px; font-weight: bold;" onclick="openManageModal('category')">⚙️ 管理分類</span>
            </div>
            <select id="inputCategory"></select>
        </div>

        <div class="form-group">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px;">
                <label id="labelAccount" data-i18n="accountSource" style="margin-bottom: 0;">帳戶 / 來源</label>
                <span style="cursor: pointer; color: #007bff; font-size: 13px; font-weight: bold;" onclick="openManageModal('account')">⚙️ 管理帳戶</span>
            </div>
            <select id="inputAccount"></select>
        </div>

        <div class="form-group" id="groupToAccount" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px;">
                <label data-i18n="toAccount" style="margin-bottom: 0;">轉入帳戶</label>
            </div>
            <select id="inputToAccount"></select>
        </div>

        <div class="form-group">
            <label data-i18n="amount">金額</label>
            <input type="number" id="inputAmount" placeholder="輸入金額 (HKD)" data-i18n-placeholder="amountPlaceholder">
        </div>

        <div class="form-group">
            <label data-i18n="remark">備註 (選填)</label>
            <input type="text" id="inputRemark" placeholder="輸入備註細節..." data-i18n-placeholder="remarkPlaceholder">
        </div>

        <button onclick="addTransaction()" data-i18n="confirmAdd">確認新增</button>
    </div>

    <div class="card">
        <h3 data-i18n="expenseAnalysis">📈 支出分析</h3>
        <div class="chart-container">
            <canvas id="expenseChart"></canvas>
        </div>
        <div id="analysisReport" style="margin-top: 20px; padding: 15px; background-color: #f8f9fa; border-radius: 8px; border-left: 5px solid #ffc107;">
            目前尚無支出資料可供分析
        </div>
    </div>

    <div class="card">
        <h3 data-i18n="incomeAnalysis">💰 收入分析</h3>
        <div class="chart-container">
            <canvas id="incomeChart"></canvas>
        </div>
        <div id="incomeReport" style="margin-top: 20px; padding: 15px; background-color: #f8f9fa; border-radius: 8px; border-left: 5px solid #28a745;">
            目前尚無收入資料可供分析
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
            <h3 id="recentRecordsTitle" style="margin: 0;">📝 最近 5 筆交易紀錄</h3>
            
            <select id="recordLimit" onchange="updateDashboard()" style="width: auto; min-width: 110px; margin-bottom: 0; padding: 8px; border-radius: 8px; border: 1px solid #ced4da;">
                <option value="5">顯示 5 筆</option>
                <option value="10">顯示 10 筆</option>
                <option value="all">顯示全部</option>
            </select>

            <input type="search" id="searchInput" oninput="updateDashboard()" placeholder="🔍 搜尋分類、帳戶或備註..." data-i18n-placeholder="searchPlaceholder" style="flex: 1; min-width: 180px; max-width: 300px; margin-bottom: 0; padding: 8px 12px; border-radius: 8px;">

            <button onclick="window.open('details.html', '_blank')" style="width: auto; background-color: #007bff; margin-top: 0; padding: 8px 15px;">
                📄 詳細檢視
            </button>
        </div>
        
        <ul id="transactionList" style="margin-top: 15px;"></ul>
        <button onclick="clearAllData()" style="background-color: #dc3545; margin-top: 15px;" data-i18n="clearAll">🗑️ 清除所有紀錄</button>
    </div>

    <div class="card" style="text-align: center; margin-bottom: 20px; padding: 15px;">
        <label data-i18n="customBg" style="display: inline-block; font-weight: bold; margin-right: 10px;">自訂背景圖片：</label>
        <input type="file" id="bgInput" accept="image/*" onchange="changeBackground(event)" style="display: inline-block; width: auto; padding: 5px; border: none;">
        <button onclick="clearBackground()" style="background-color: #6c757d; width: auto; padding: 8px 15px; margin-left: 10px; border-radius: 6px;" data-i18n="clearBg">清除背景</button>
    </div>

    <div style="text-align: center; margin-top: 40px; margin-bottom: 20px;">
        <a href="https://forms.gle/wq5mujBuZDa4PYfx6" target="_blank">
            <button style="background-color: #17a2b8; width: auto; padding: 10px 30px; border-radius: 20px;" data-i18n="feedbackBtn">
                💡 給開發者留言回饋 (Feedback)
            </button>
        </a>
    </div>

    <div id="manageModal" class="modal-overlay" style="display: none;">
        <div class="modal-content card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 id="modalTitle" style="margin: 0;">⚙️ 管理選項</h3>
                <button onclick="closeManageModal()" class="close-btn" style="padding: 5px 10px;">✖</button>
            </div>
            
            <ul id="modalList" style="max-height: 300px; overflow-y: auto; padding: 0; margin-bottom: 15px;"></ul>
            
            <div style="display: flex; gap: 10px;">
                <input type="text" id="newOptionInput" placeholder="輸入新選項..." style="flex: 1; margin-bottom: 0;">
                <button onclick="addNewOption()" style="width: auto; padding: 10px 15px; background: #28a745; margin-top: 0;">➕ 新增</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
