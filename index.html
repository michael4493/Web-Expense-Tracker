<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰肥蟲記帳本💰</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 10px;">
        <button onclick="toggleTheme()" class="theme-btn" id="themeBtn">🌙 暗色模式</button>
        <button onclick="toggleLanguage()" class="lang-btn">🌐 EN / 中文</button>
    </div>

    <h1 data-i18n="appTitle">💰 肥蟲記賬本🐛 💰</h1>

    <div class="card" style="display: flex; flex-wrap: wrap; justify-content: flex-end; align-items: center; padding: 15px; margin-bottom: 25px;">
        <label for="filterTime" style="font-weight: 700; margin-right: 15px; margin-bottom: 0;" data-i18n="viewRange">📅 查看範圍：</label>
        
        <select id="filterTime" onchange="handleFilterChange()" style="width: auto; min-width: 180px; margin-bottom: 0;">
            <option value="all" data-i18n="rangeAll">全部紀錄 (All Time)</option>
            <option value="month" data-i18n="rangeMonth">這個月 (This Month)</option>
            <option value="week" data-i18n="rangeWeek">最近 7 天 (Last 7 Days)</option>
            <option value="custom" data-i18n="rangeCustom">自訂範圍 (Custom)</option>
        </select>
        
        <div id="customDateArea" style="display: none; margin-top: 15px; width: 100%; text-align: right;">
            <input type="date" id="customStartDate" onchange="updateDashboard()" style="width: auto; display: inline-block;"> 
            <span data-i18n="to" style="margin: 0 10px; font-weight: bold;">至</span> 
            <input type="date" id="customEndDate" onchange="updateDashboard()" style="width: auto; display: inline-block;">
        </div>
    </div>

    <div class="summary-container">
        <div class="summary-box bg-income">
            <span data-i18n="totalIncome">總收入</span><br>$<span id="totalIncome">0</span>
        </div>
        <div class="summary-box bg-expense">
            <span data-i18n="totalExpense">總支出</span><br>$<span id="totalExpense">0</span>
        </div>
        <div class="summary-box bg-save">
            <span data-i18n="currentBalance">目前結餘</span><br>$<span id="totalBalance">0</span>
        </div>
    </div>

    <div class="card">
        <h3 data-i18n="addTransaction">➕ 新增交易</h3>
        <div class="form-group">
            <label data-i18n="date">日期</label>
            <input type="date" id="inputDate">
        </div>
        
        <div class="form-group">
            <label data-i18n="transactionType">交易類型</label>
            <div class="type-btn-group">
                <button type="button" id="btnExpense" class="type-btn active" onclick="setTransactionType('expense')" data-i18n="expenseBtn">支出💸</button>
                <button type="button" id="btnIncome" class="type-btn" onclick="setTransactionType('income')" data-i18n="incomeBtn">收入💰</button>
            </div>
            <input type="hidden" id="inputType" value="expense">
        </div>

        <div class="form-group">
            <label data-i18n="category">用途 / 分類</label>
            <select id="inputCategory">
                <optgroup label="支出用途" id="optExpense">  
                    <option value="Meal">Meal🥔🍳🧋</option>
                    <option value="Entertainment">Entertainment🎮 (娛樂)</option>
                    <option value="Shopping">Shopping👜 (makeup, bag, clothes...)</option>
                    <option value="Online Shopping">Online Shopping🛍️</option>
                    <option value="Taxi">Uber/Taxi🚕</option>
                    <option value="In Octopus">In Octopus🐙</option>
                    <option value="Nail">Nail💅</option>
                    <option value="Credit Card Bill">找卡數💳 (Credit Card Bill)</option>
                    <option value="Travel">Travel🚋</option>
                    <option value="Other">Other📝</option>
                </optgroup>
                <optgroup label="收入來源" id="optIncome">
                    <option value="Salary">Salary🪙</option>
                    <option value="Scholarship">Scholarship💯</option>
                    <option value="Gift">Gift🫴</option>
                    <option value="Other">Other📝</option>    
                </optgroup>                
            </select>
        </div>

        <div class="form-group">
            <label data-i18n="accountSource">帳戶 / 來源</label>
            <select id="inputAccount">
                <optgroup label="帳戶 (Accounts)">
                    <option value="Cash">Cash💵</option>
                    <option value="Credit Card DBS">Credit Card DBS💳</option>
                    <option value="Alipay">Alipay🩲</option>
                    <option value="Mox">Mox📇</option>
                    <option value="ZA Bank">ZA Bank💹</option>
                    <option value="Payme">Payme🧾</option>
                    <option value="Tap&Go">Tap&Go🏷️</option>
                    <option value="BOC">BOC💼</option>
                    <option value="Octopus">Octopus🐙</option>
                </optgroup>
                <optgroup label="來源 (Sources)">
                    <option value="Mum">Mum👺</option>
                    <option value="Michael">Michael👦</option>
                    <option value="Grandma">Grandma👵</option>
                    <option value="Other">Other📝</option>
                </optgroup>
            </select>
        </div>

        <div class="form-group">
            <label data-i18n="amount">金額</label>
            <input type="number" id="inputAmount" placeholder="輸入金額 (HKD)" data-i18n-placeholder="amountPlaceholder">
        </div>

        <div class="form-group">
            <label data-i18n="remark">備註 (選填)</label>
            <input type="text" id="inputRemark" placeholder="輸入備註細節..." data-i18n-placeholder="remarkPlaceholder">
        </div>

        <button onclick="addTransaction()" data-i18n="confirmAdd">確認新增</button>
    </div>

    <div class="card">
        <h3 data-i18n="expenseAnalysis">📈 支出分析</h3>
        <div class="chart-container">
            <canvas id="expenseChart"></canvas>
        </div>
        <div id="analysisReport" style="margin-top: 20px; padding: 15px; background-color: #f8f9fa; border-radius: 8px; border-left: 5px solid #ffc107;">
            目前尚無支出資料可供分析
        </div>
    </div>

    <div class="card">
        <h3 data-i18n="incomeAnalysis">💰 收入來源分析</h3>
        <div class="chart-container">
            <canvas id="incomeChart"></canvas>
        </div>
        <div id="incomeReport" style="margin-top: 20px; padding: 15px; background-color: #f8f9fa; border-radius: 8px; border-left: 5px solid #28a745;">
            目前尚無收入資料可供分析
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 data-i18n="recentRecords" style="margin: 0;">📝 最近交易紀錄</h3>
            
            <button onclick="window.open('details.html', '_blank')" style="width: auto; background-color: #007bff; margin-top: 0; padding: 8px 15px;">
                📄 詳細檢視
            </button>
        </div>
        
        <ul id="transactionList" style="margin-top: 15px;"></ul>
        <button onclick="clearAllData()" style="background-color: #dc3545; margin-top: 15px;" data-i18n="clearAll">🗑️ 清除所有紀錄</button>
    </div>

    <div class="card" style="text-align: center; margin-bottom: 20px; padding: 15px;">
        <label data-i18n="customBg" style="display: inline-block; font-weight: bold; margin-right: 10px;">自訂背景圖片：</label>
        
        <input type="file" id="bgInput" accept="image/*" onchange="changeBackground(event)" style="display: inline-block; width: auto; padding: 5px; border: none;">
        
        <button onclick="clearBackground()" style="background-color: #6c757d; width: auto; padding: 8px 15px; margin-left: 10px; border-radius: 6px;" data-i18n="clearBg">清除背景</button>
    </div>

    <div style="text-align: center; margin-top: 40px; margin-bottom: 20px;">
        <a href="https://forms.gle/wq5mujBuZDa4PYfx6" target="_blank">
            <button style="background-color: #17a2b8; width: auto; padding: 10px 30px; border-radius: 20px;" data-i18n="feedbackBtn">
                💡 給開發者留言回饋 (Feedback)
            </button>
        </a>
    </div>

    <script src="script.js"></script>
</body>
</html>
