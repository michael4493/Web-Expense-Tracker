<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰肥蟲記帳本💰</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>💰 肥蟲記賬本🐛 💰</h1>

    <div class="summary-container">
        <div class="summary-box bg-income">
            總收入<br>$<span id="totalIncome">0</span>
        </div>
        <div class="summary-box bg-expense">
            總支出<br>$<span id="totalExpense">0</span>
        </div>
        <div class="summary-box bg-save">
            目前結餘 (儲錢)<br>$<span id="totalBalance">0</span>
        </div>
    </div>

    <div class="card">
        <h3>➕ 新增交易</h3>
        <div class="form-group">
            <label>日期</label>
            <input type="date" id="inputDate">
        </div>
        
        <div class="form-group">
            <label>交易類型</label>
            <select id="inputType">
                <option value="expense">支出💸 (Expense)</option>
                <option value="income">收入💰 (Income)</option>
                <option value="transfer">找卡數 / 轉帳💳 (Transfer)</option>
                <option value="lend">借人錢😁 (Lend)</option>
                <option value="repay">人哋還錢🤭 (Repay)</option>
            </select>
        </div>

        <div class="form-group">
            <label>途徑 / 分類</label>
            <select id="inputCategory">
                <option value="Breakfast">Breakfast🥐</option>
                <option value="Lunch">Lunch🍜</option>
                <option value="Dinner">Dinner🍛</option>
                <option value="Online Shopping">Online Shopping🛍️</option>
                <option value="Shopping">Shopping👜 (makeup, bag, clothes...)</option>
                <option value="Playing">Entertainment🎮 (高級playing)</option>
                <option value="Travel">Travel🚋</option>
                <option value="In Octopus">In Octopus🐙</option>
                <option value="Nail">Nail💅</option>
                <option value="Credit Card Bill">找卡數💳 (Credit Card Bill)</option>
                <option value="Debt">借貸相關🧾 (Debt)</option>
                <option value="Income">收入🪙</option>
                <option value="Other">其他📝</option>
            </select>
        </div>

        <div class="form-group">
            <label>帳戶 / 來源</label>
            <select id="inputAccount">
                <optgroup label="帳戶 (Accounts)">
                    <option value="Cash">Cash💵</option>
                    <option value="Credit Card DBS">Credit Card DBS💳</option>
                    <option value="Alipay">Alipay🩲</option>
                    <option value="Mox">Mox📇</option>
                    <option value="ZA Bank">ZA Bank💹</option>
                    <option value="Payme">Payme🧾</option>
                    <option value="Tap&Go">Tap&Go🏷️</option>
                    <option value="BOC">BOC💼</option>
                    <option value="Octopus">Octopus🐙</option>
                </optgroup>
                <optgroup label="收入來源 (Income Sources)">
                    <option value="Mum">Mum👺</option>
                    <option value="Michael">Michael👦</option>
                    <option value="Grandma">Grandma👵</option>
                    <option value="Salary">Salary💹</option>
                    <option value="Other">Other📝</option>
                </optgroup>
            </select>
        </div>

        <div class="form-group">
            <label>金額</label>
            <input type="number" id="inputAmount" placeholder="輸入金額 (HKD)">
        </div>

        <button onclick="addTransaction()">確認新增</button>
    </div>

    <div class="card">
        <h3>📈 邊項支出最多 (支出分析)</h3>
        <div class="chart-container">
            <canvas id="expenseChart"></canvas>
        </div>
        
        <div id="analysisReport" style="margin-top: 20px; padding: 15px; background-color: #f8f9fa; border-radius: 8px; border-left: 5px solid #ffc107;">
            目前尚無支出資料可供分析。
        </div>
    </div>

    <div class="card">
        <h3>💰 收入來源分析</h3>
        <div class="chart-container">
            <canvas id="incomeChart"></canvas>
        </div>
        
        <div id="incomeReport" style="margin-top: 20px; padding: 15px; background-color: #f8f9fa; border-radius: 8px; border-left: 5px solid #28a745;">
            目前尚無收入資料可供分析。
        </div>
    </div>

    <div class="card">
        <h3>📝 最近交易紀錄</h3>
        <ul id="transactionList">
            </ul>
        
        <button onclick="clearAllData()" style="background-color: #dc3545; margin-top: 15px;">🗑️ 清除所有紀錄</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
